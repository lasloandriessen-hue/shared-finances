...form,quantity:e.target.value})}/></div>}</div><div style={{display:'flex',gap:8}}><button className="add-btn green" type="submit" style={{padding:'8px 20px',fontSize:13}}>Opslaan</button><button className="add-btn secondary" type="button" onClick={onCancel} style={{padding:'8px 20px',fontSize:13}}>Annuleren</button></div></form>);
}

function RenovationItemCard({item,calcTotal,onChoose,onStatusChange,onDelete,onRefresh}){
  const[editing,setEditing]=useState(false);
  const[form,setForm]=useState({name:item.name,price:item.price,price_type:item.price_type,quantity:item.quantity,image_url:item.image_url||'',notes:item.notes||'',status:item.status,url:item.url||''});
  const total=calcTotal(item);
  const statusInfo=STATUS_OPTIONS.find(s=>s.id===item.status)||STATUS_OPTIONS[0];
  if(editing)return(<div style={{gridColumn:'1/-1'}}><form onSubmit={async e=>{e.preventDefault();await supabase.from('renovation_items').update({name:form.name,price:parseFloat(form.price)||0,price_type:form.price_type,quantity:parseFloat(form.quantity)||1,image_url:form.image_url,notes:form.notes,status:form.status,url:form.url}).eq('id',item.id);setEditing(false);onRefresh();}} style={{background:'#f8faff',borderRadius:12,padding:16,border:'2px solid #667eea'}}><div className="form-row"><div className="form-group"><label className="form-label">Naam</label><input className="form-input" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} required/></div><div className="form-group"><label className="form-label">Prijs (€)</label><input className="form-input" type="number" step="0.01" value={form.price} onChange={e=>setForm({...form,price:e.target.value})}/></div></div><div className="form-row"><div className="form-group"><label className="form-label">Type</label><select className="form-select" value={form.price_type} onChange={e=>setForm({...form,price_type:e.target.value})}>{PRICE_TYPES.map(p=><option key={p.id} value={p.id}>{p.label}</option>)}</select></div>{form.price_type!=='total'&&<div className="form-group"><label className="form-label">Aantal</label><input className="form-input" type="number" step="0.1" value={form.quantity} onChange={e=>setForm({...form,quantity:e.target.value})}/></div>}</div><div className="form-row"><div className="form-group"><label className="form-label">Status</label><select className="form-select" value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>{STATUS_OPTIONS.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}</select></div><div className="form-group"><label className="form-label">Afbeelding URL</label><input className="form-input" value={form.image_url} onChange={e=>setForm({...form,image_url:e.target.value})}/></div></div><div className="form-group" style={{marginBottom:12}}><label className="form-label">Product URL</label><input className="form-input" value={form.url} onChange={e=>setForm({...form,url:e.target.value})}/></div><div style={{display:'flex',gap:8}}><button className="add-btn" type="submit" style={{padding:'8px 20px',fontSize:13}}>Opslaan</button><button className="add-btn secondary" type="button" onClick={()=>setEditing(false)} style={{padding:'8px 20px',fontSize:13}}>Annuleren</button></div></form></div>);
  return(<div className={`reno-item ${item.is_chosen?'chosen':''} ${item.status==='betaald'?'paid':''}`}>{item.is_chosen&&<div className="chosen-ribbon">✓ Gekozen</div>}<div className="reno-item-img">{item.image_url?<img src={item.image_url} alt={item.name} onError={e=>{e.target.style.display='none';e.target.parentElement.innerHTML='🔨';}}/>:'🔨'}</div><div className="reno-item-body"><div className="reno-item-name">{item.name}</div><div className="reno-item-price">{fmtEur(item.price)}{item.price_type!=='total'&&<span style={{fontSize:13,color:'#94a3b8'}}> /{item.price_type==='m2'?'m²':item.price_type==='hour'?'uur':'stuk'}</span>}</div>{item.price_type!=='total'&&<div className="reno-item-total">Totaal: {fmtEur(total)}</div>}{item.notes&&<div style={{fontSize:12,color:'#64748b',marginBottom:8}}>{item.notes}</div>}<div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap'}}><span className={`status-badge ${item.status}`}>{statusInfo.label}</span>{item.url&&<a href={item.url} target="_blank" rel="noopener noreferrer" style={{fontSize:11,color:'#667eea',fontWeight:600,textDecoration:'none'}}>🔗 Link</a>}</div><div className="reno-item-actions">{!item.is_chosen&&<button className="add-btn green" style={{padding:'5px 12px',fontSize:12}} onClick={onChoose}>✓ Kiezen</button>}<select className="form-select" style={{padding:'5px 8px',fontSize:12,flex:1}} value={item.status} onChange={e=>onStatusChange(e.target.value)}>{STATUS_OPTIONS.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}</select><button className="delete-btn" onClick={()=>setEditing(true)}>✏️</button><button className="delete-btn" onClick={onDelete}>🗑</button></div></div></div>);
}

// ── TIMELINE TAB (NIEUW) ──────────────────────────────────────────────────────
function TimelineTab({settings}){
  const[tasks,setTasks]=useState([]);
  const[phases,setPhases]=useState([]);
  const[analyzing,setAnalyzing]=useState(false);
  const[lightboxUrl,setLightboxUrl]=useState(null);
  const[showAddTask,setShowAddTask]=useState(false);
  const[showAddPhase,setShowAddPhase]=useState(false);
  const[dragOver,setDragOver]=useState(null);
  const dragItem=useRef(null);
  const dragSource=useRef(null);
  const fileInputRef=useRef(null);
  const photoTaskRef=useRef(null);

  const fetchData=useCallback(async()=>{
    const[tRes,pRes]=await Promise.all([
      supabase.from('renovation_timeline').select('*').order('order_position'),
      supabase.from('renovation_phases').select('*').order('sort_order'),
    ]);
    setTasks(tRes.data||[]);
    setPhases(pRes.data||[]);
  },[]);
  useEffect(()=>{fetchData();},[fetchData]);

  const phaseTasks=tasks.filter(t=>!t.is_parallel&&t.phase);
  const parallelTasks=tasks.filter(t=>t.is_parallel||!t.phase);
  const doneTasks=tasks.filter(t=>t.status==='done').length;
  const totalHours=tasks.reduce((s,t)=>s+Number(t.estimated_hours||0),0);
  const inProgressTasks=tasks.filter(t=>t.status==='in_progress').length;

  const cycleStatus=async(task)=>{
    const ns=task.status==='pending'?'in_progress':task.status==='in_progress'?'done':'pending';
    await supabase.from('renovation_timeline').update({status:ns}).eq('id',task.id);
    fetchData();
  };

  const deleteTask=async(id)=>{
    await supabase.from('renovation_timeline').delete().eq('id',id);
    fetchData();
  };

  const deletePhase=async(id)=>{
    // Move tasks in this phase to parallel
    await supabase.from('renovation_timeline').update({phase:'',is_parallel:true}).eq('phase',id);
    await supabase.from('renovation_phases').delete().eq('id',id);
    fetchData();
  };

  const handleDragStart=(e,taskId,source)=>{
    dragItem.current=taskId;
    dragSource.current=source;
    e.dataTransfer.effectAllowed='move';
  };

  const handleDrop=async(e,targetId,targetType,phaseId)=>{
    e.preventDefault();
    if(!dragItem.current)return;
    const taskId=dragItem.current;
    if(taskId===targetId){setDragOver(null);return;}

    if(targetType==='phase'){
      // Drop onto phase header → move task to that phase
      await supabase.from('renovation_timeline').update({phase:phaseId,is_parallel:false}).eq('id',taskId);
    } else if(targetType==='parallel'){
      // Drop onto parallel zone → make parallel
      await supabase.from('renovation_timeline').update({phase:'',is_parallel:true}).eq('id',taskId);
    } else if(targetType==='task'){
      // Reorder within same context
      const newTasks=[...tasks];
      const fromIdx=newTasks.findIndex(t=>t.id===taskId);
      const toIdx=newTasks.findIndex(t=>t.id===targetId);
      if(fromIdx!==-1&&toIdx!==-1){
        const[moved]=newTasks.splice(fromIdx,1);
        newTasks.splice(toIdx,0,moved);
        for(let i=0;i<newTasks.length;i++){
          await supabase.from('renovation_timeline').update({order_position:i}).eq('id',newTasks[i].id);
        }
      }
    }
    dragItem.current=null;dragSource.current=null;setDragOver(null);
    fetchData();
  };

  const analyzeWithAI=async()=>{
    if(!settings.openai_key){alert('Voeg eerst je OpenAI API key toe.');return;}
    if(tasks.length===0){alert('Voeg eerst taken toe.');return;}
    setAnalyzing(true);
    try{
      const phaseNames=phases.map(p=>p.name).join(', ');
      const taskList=tasks.map(t=>t.task_name).join('\n');
      const res=await fetch('https://api.openai.com/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${settings.openai_key}`},
        body:JSON.stringify({model:'gpt-4o',messages:[{role:'user',content:`Je bent een verbouwingsexpert. Beschikbare fasen: ${phaseNames||'geen'}.\nTaken:\n${taskList}\n\nGeef JSON terug: { "ordered_tasks": [{ "task_name": "naam", "description": "uitleg", "estimated_hours": getal, "tips": "aandachtspunten", "depends_on_names": ["naam"], "phase_name": "naam van fase of leeg als parallel", "is_parallel": bool, "is_new": bool }] }`}],max_tokens:2000})
      });
      const d=await res.json();
      const text=d.choices?.[0]?.message?.content||'';
      const m=text.match(/\{[\s\S]*\}/);
      if(m){
        const{ordered_tasks}=JSON.parse(m[0]);
        const nameToId={};tasks.forEach(t=>{nameToId[t.task_name.toLowerCase()]=t.id;});
        const phaseNameToId={};phases.forEach(p=>{phaseNameToId[p.name.toLowerCase()]=p.id;});
        for(let i=0;i<ordered_tasks.length;i++){
          const ot=ordered_tasks[i];
          let tid=nameToId[ot.task_name.toLowerCase()];
          if(!tid&&ot.is_new){
            const{data:ins}=await supabase.from('renovation_timeline').insert({task_name:ot.task_name,description:ot.description||'',estimated_hours:ot.estimated_hours||0,tips:ot.tips||'',status:'pending',order_position:i,depends_on:[],ai_suggested:true,is_parallel:ot.is_parallel||false,phase:phaseNameToId[ot.phase_name?.toLowerCase()]||''}).select().single();
            if(ins){tid=ins.id;nameToId[ot.task_name.toLowerCase()]=ins.id;}
          }
          if(!tid)continue;
          const depIds=(ot.depends_on_names||[]).map(n=>nameToId[n.toLowerCase()]).filter(Boolean);
          const phaseId=phaseNameToId[ot.phase_name?.toLowerCase()]||'';
          await supabase.from('renovation_timeline').update({order_position:i,description:ot.description||'',estimated_hours:ot.estimated_hours||0,tips:ot.tips||'',depends_on:depIds,phase:phaseId,is_parallel:ot.is_parallel||false}).eq('id',tid);
        }
        await fetchData();
      }
    }catch(e){console.error(e);}
    setAnalyzing(false);
  };

  const analyzePhoto=async(file,taskId)=>{
    if(!settings.openai_key)return;
    try{
      const compressed=await compressImage(file,800,0.6);
      const fn=`timeline_${Date.now()}.jpg`;
      await supabase.storage.from('receipts').upload(fn,compressed,{contentType:'image/jpeg',upsert:true});
      const{data:ud}=supabase.storage.from('receipts').getPublicUrl(fn);
      await supabase.from('renovation_timeline').update({photo_url:ud.publicUrl}).eq('id',taskId);
      const reader=new FileReader();
      reader.onload=async ev=>{
        const base64=ev.target.result.split(',')[1];
        const taskName=tasks.find(t=>t.id===taskId)?.task_name||'';
        const res=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${settings.openai_key}`},body:JSON.stringify({model:'gpt-4o',messages:[{role:'user',content:[{type:'text',text:`Foto bij taak: "${taskName}". Analyseer en geef JSON: { "extra_tasks": [{ "task_name": "naam", "description": "uitleg", "estimated_hours": getal, "tips": "tips" }], "observations": "wat je ziet" }. Lege array als niets nodig.`},{type:'image_url',image_url:{url:`data:image/jpeg;base64,${base64}`}}]}],max_tokens:1000})});
        const d=await res.json();const t=d.choices?.[0]?.message?.content||'';const m=t.match(/\{[\s\S]*\}/);
        if(m){const{extra_tasks,observations}=JSON.parse(m[0]);const ct=tasks.find(t=>t.id===taskId);const newIds=[];for(let i=0;i<(extra_tasks||[]).length;i++){const{data:ins}=await supabase.from('renovation_timeline').insert({task_name:extra_tasks[i].task_name,description:extra_tasks[i].description||'',estimated_hours:extra_tasks[i].estimated_hours||0,tips:extra_tasks[i].tips||'',status:'pending',order_position:(ct?.order_position||0)-0.1,depends_on:[],ai_suggested:true,is_parallel:false,phase:ct?.phase||''}).select().single();if(ins)newIds.push(ins.id);}
        if(newIds.length>0){await supabase.from('renovation_timeline').update({depends_on:[...(ct?.depends_on||[]),...newIds]}).eq('id',taskId);}
        await fetchData();if(observations)alert(`📸 AI: ${observations}`);}
      };
      reader.readAsDataURL(compressed);
    }catch(e){console.error(e);}
  };

  const getPhaseColor=(color)=>`phase-color-${color||'purple'}`;
  const getPhaseLineColor=(color)=>`phase-line-${color||'purple'}`;
  const getDotColor=(color)=>`dot-${color||'purple'}`;

  return(
    <div>
      {lightboxUrl&&<div className="modal-overlay" onClick={()=>setLightboxUrl(null)}><button className="modal-close">✕</button><img className="modal-img" src={lightboxUrl} alt="foto"/></div>}
      <input ref={fileInputRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={async e=>{const file=e.target.files[0];if(!file||!photoTaskRef.current)return;await analyzePhoto(file,photoTaskRef.current);e.target.value='';}}/>

      {/* Hero */}
      <div className="tl-hero">
        <div className="tl-hero-title">📅 Verbouwingstijdlijn</div>
        <div className="tl-hero-sub">Fasen met afhankelijkheden · Parallelle taken apart</div>
        <div className="tl-stats">
          <div className="tl-stat"><div className="tl-stat-val">{tasks.length}</div><div className="tl-stat-label">Totaal taken</div></div>
          <div className="tl-stat"><div className="tl-stat-val">{doneTasks}</div><div className="tl-stat-label">Afgerond</div></div>
          <div className="tl-stat"><div className="tl-stat-val">{inProgressTasks}</div><div className="tl-stat-label">Bezig</div></div>
          <div className="tl-stat"><div className="tl-stat-val">{totalHours}u</div><div className="tl-stat-label">Geschatte tijd</div></div>
        </div>
      </div>

      {!settings.openai_key&&<div style={{background:'#fef3c7',border:'2px solid #f59e0b',borderRadius:12,padding:16,marginBottom:24,fontSize:14,color:'#92400e'}}>⚠️ Voeg eerst je OpenAI API key toe via ⚙️ Settings.</div>}

      {/* Actieknoppen */}
      <div style={{display:'flex',gap:10,marginBottom:24,flexWrap:'wrap'}}>
        <button className="add-btn" style={{background:'linear-gradient(135deg,#7c3aed,#4f46e5)'}} onClick={analyzeWithAI}>🤖 AI: Plan verbouwing</button>
        <button className="add-btn secondary" onClick={()=>setShowAddPhase(!showAddPhase)}>{showAddPhase?'Annuleren':'+ Fase toevoegen'}</button>
        <button className="add-btn secondary" onClick={()=>setShowAddTask(!showAddTask)}>{showAddTask?'Annuleren':'+ Taak toevoegen'}</button>
      </div>

      {/* Fase toevoegen form */}
      {showAddPhase&&<AddPhaseForm onSave={async(name,color)=>{const mo=phases.length>0?Math.max(...phases.map(p=>p.sort_order||0)):0;await supabase.from('renovation_phases').insert({name,color,sort_order:mo+1});setShowAddPhase(false);fetchData();}} onCancel={()=>setShowAddPhase(false)}/>}

      {/* Taak toevoegen form */}
      {showAddTask&&<AddTaskForm phases={phases} onSave={async(data)=>{const pos=tasks.length>0?Math.max(...tasks.map(t=>t.order_position||0))+1:0;await supabase.from('renovation_timeline').insert({...data,order_position:pos,status:'pending',depends_on:[],ai_suggested:false});setShowAddTask(false);fetchData();}} onCancel={()=>setShowAddTask(false)}/>}

      {analyzing&&<div className="ai-analyzing"><div className="ai-analyzing-icon">🤖</div><div style={{fontSize:16,fontWeight:700,marginBottom:4}}>AI analyseert je verbouwing…</div><div style={{fontSize:13,opacity:0.85}}>Taken worden ingedeeld in fasen en geprioriteerd</div></div>}

      {tasks.length===0&&!analyzing&&<div className="empty"><div className="empty-icon">📋</div>Voeg fasen en taken toe om te beginnen</div>}

      {/* Fasen tijdlijn */}
      {phases.map(phase=>{
        const phaseTasks=tasks.filter(t=>t.phase===phase.id&&!t.is_parallel);
        const doneCount=phaseTasks.filter(t=>t.status==='done').length;
        const phaseHours=phaseTasks.reduce((s,t)=>s+Number(t.estimated_hours||0),0);
        return(
          <div key={phase.id} className="tl-phase"
            onDragOver={e=>{e.preventDefault();setDragOver('phase-'+phase.id);}}
            onDrop={e=>handleDrop(e,null,'phase',phase.id)}
            onDragLeave={()=>setDragOver(null)}
          >
            <div className={`tl-phase-header ${getPhaseColor(phase.color)}`} style={{opacity:dragOver==='phase-'+phase.id?0.8:1}}>
              <div className="tl-phase-name">{phase.name}</div>
              <div className="tl-phase-meta">{doneCount}/{phaseTasks.length} klaar · {phaseHours}u</div>
              <button onClick={()=>deletePhase(phase.id)} style={{background:'rgba(255,255,255,0.2)',border:'none',borderRadius:8,padding:'4px 10px',color:'white',cursor:'pointer',fontSize:12,marginLeft:8}}>🗑</button>
            </div>
            {phaseTasks.length===0
              ?<div style={{padding:'16px 32px',fontSize:13,color:'#94a3b8',fontStyle:'italic'}}>Sleep taken hierheen of voeg toe via "+ Taak toevoegen"</div>
              :<div className="tl-phase-tasks">
                <div className={`tl-phase-line ${getPhaseLineColor(phase.color)}`}/>
                {phaseTasks.map((task,idx)=>{
                  const deps=tasks.filter(t=>(task.depends_on||[]).includes(t.id));
                  return(
                    <div key={task.id} className="tl-task"
                      draggable
                      onDragStart={e=>handleDragStart(e,task.id,'phase')}
                      onDragOver={e=>{e.preventDefault();setDragOver('task-'+task.id);}}
                      onDrop={e=>handleDrop(e,task.id,'task',phase.id)}
                      onDragLeave={()=>setDragOver(null)}
                    >
                      <div className={`tl-task-dot ${getDotColor(phase.color)} ${task.status==='done'?'done':''}`}
                        style={{color:task.status==='done'?'white':'inherit'}}
                        onClick={()=>cycleStatus(task)}
                      >
                        {task.status==='done'?'✓':task.status==='in_progress'?'▶':''}
                      </div>
                      <div className={`tl-task-card ${task.status} ${task.ai_suggested?'ai-tag ai-border-'+phase.color:''} ${dragOver==='task-'+task.id?'drag-over':''}`}>
                        <div className="tl-task-top">
                          <div>
                            <div className={`tl-task-name ${task.status==='done'?'done':''}`}>{task.task_name}</div>
                            <div className="tl-task-badges">
                              {task.estimated_hours>0&&<span className="tl-badge hours">⏱ {task.estimated_hours}u</span>}
                              {task.ai_suggested&&<span className="tl-badge ai">🤖 AI</span>}
                              <span className={`tl-badge ${task.status}`}>{task.status==='done'?'✓ Klaar':task.status==='in_progress'?'▶ Bezig':'⏳ Wacht'}</span>
                            </div>
                          </div>
                          <div style={{display:'flex',gap:4,flexShrink:0}}>
                            <button className="delete-btn" onClick={()=>{photoTaskRef.current=task.id;fileInputRef.current.click();}}>📸</button>
                            <button className="delete-btn" onClick={()=>deleteTask(task.id)}>🗑</button>
                          </div>
                        </div>
                        {task.photo_url&&<img className="tl-task-photo" src={task.photo_url} alt="foto" onClick={()=>setLightboxUrl(task.photo_url)}/>}
                        {task.description&&<div className="tl-task-desc">{task.description}</div>}
                        {task.tips&&<div className="tl-task-tips">💡 {task.tips}</div>}
                        {deps.length>0&&(
                          <div className="tl-task-deps">
                            <span style={{marginRight:6}}>Eerst klaar:</span>
                            {deps.map(d=><span key={d.id} style={{marginRight:8,color:d.status==='done'?'#10b981':'#64748b',textDecoration:d.status==='done'?'line-through':'none'}}>→ {d.task_name}{d.status==='done'?' ✓':''}</span>)}
                          </div>
                        )}
                        <div className="tl-task-actions">
                          <button className="add-btn secondary" style={{padding:'4px 12px',fontSize:11}} onClick={()=>cycleStatus(task)}>
                            {task.status==='pending'?'▶ Start':task.status==='in_progress'?'✓ Klaar':'↩ Heropen'}
                          </button>
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            }
          </div>
        );
      })}

      {/* Parallelle taken */}
      <div className="tl-parallel-section"
        onDragOver={e=>{e.preventDefault();setDragOver('parallel');}}
        onDrop={e=>handleDrop(e,null,'parallel',null)}
        onDragLeave={()=>setDragOver(null)}
      >
        <div className="tl-parallel-divider">
          <div className="tl-parallel-line"/>
          <div className="tl-parallel-label">PARALLEL — GEEN VASTE VOLGORDE</div>
          <div className="tl-parallel-line"/>
        </div>
        {parallelTasks.length===0
          ?<div style={{textAlign:'center',padding:'20px',fontSize:13,color:'#94a3b8',fontStyle:'italic',border:'2px dashed #e2e8f0',borderRadius:12,background:dragOver==='parallel'?'#f0f4ff':'transparent'}}>Sleep taken hierheen die geen vaste volgorde hebben</div>
          :<div className="tl-parallel-grid">
            {parallelTasks.map(task=>(
              <div key={task.id} className={`tl-parallel-card ${task.status==='done'?'done':''} ${dragOver==='parallel-'+task.id?'drag-over':''}`}
                draggable
                onDragStart={e=>handleDragStart(e,task.id,'parallel')}
                onDragOver={e=>{e.preventDefault();setDragOver('parallel-'+task.id);}}
                onDrop={e=>handleDrop(e,task.id,'task',null)}
                onDragLeave={()=>setDragOver(null)}
              >
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div>
                    <div className={`tl-parallel-name ${task.status==='done'?'done':''}`}>{task.task_name}</div>
                    <div className="tl-parallel-meta">
                      {task.estimated_hours>0&&<span style={{marginRight:8}}>⏱ {task.estimated_hours}u</span>}
                      {task.status==='done'?'✓ Klaar':task.status==='in_progress'?'▶ Bezig':'Nog doen'}
                    </div>
                  </div>
                  <button className="delete-btn" onClick={()=>deleteTask(task.id)}>🗑</button>
                </div>
                {task.description&&<div style={{fontSize:11,color:'#64748b',marginTop:6}}>{task.description}</div>}
                <div style={{display:'flex',gap:6,marginTop:8}}>
                  <button className="add-btn secondary" style={{padding:'3px 10px',fontSize:11}} onClick={()=>cycleStatus(task)}>
                    {task.status==='pending'?'▶ Start':task.status==='in_progress'?'✓ Klaar':'↩'}
                  </button>
                  <button className="delete-btn" onClick={()=>{photoTaskRef.current=task.id;fileInputRef.current.click();}}>📸</button>
                </div>
              </div>
            ))}
          </div>
        }
      </div>
    </div>
  );
}

function AddPhaseForm({onSave,onCancel}){
  const[name,setName]=useState('');
  const[color,setColor]=useState('purple');
  return(
    <div style={{background:'#f5f3ff',borderRadius:12,padding:16,marginBottom:16,border:'2px solid #7c3aed'}}>
      <div style={{fontSize:13,fontWeight:600,color:'#7c3aed',marginBottom:12}}>Nieuwe fase toevoegen</div>
      <div className="form-row">
        <div className="form-group"><label className="form-label">Naam fase</label><input className="form-input" placeholder="bijv. Sloop" value={name} onChange={e=>setName(e.target.value)}/></div>
        <div className="form-group">
          <label className="form-label">Kleur</label>
          <select className="form-select" value={color} onChange={e=>setColor(e.target.value)}>
            {PHASE_COLORS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
          </select>
        </div>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button className="add-btn" style={{background:'linear-gradient(135deg,#7c3aed,#4f46e5)',padding:'8px 20px',fontSize:13}} onClick={()=>{if(name.trim())onSave(name.trim(),color);}}>Toevoegen</button>
        <button className="add-btn secondary" style={{padding:'8px 20px',fontSize:13}} onClick={onCancel}>Annuleren</button>
      </div>
    </div>
  );
}

function AddTaskForm({phases,onSave,onCancel}){
  const[form,setForm]=useState({task_name:'',estimated_hours:'',description:'',phase:'',is_parallel:false});
  return(
    <div style={{background:'#f8faff',borderRadius:12,padding:16,marginBottom:16,border:'2px solid #667eea'}}>
      <div style={{fontSize:13,fontWeight:600,color:'#667eea',marginBottom:12}}>Nieuwe taak toevoegen</div>
      <div className="form-row">
        <div className="form-group"><label className="form-label">Taaknaam</label><input className="form-input" placeholder="bijv. Vloer eruit halen" value={form.task_name} onChange={e=>setForm({...form,task_name:e.target.value})}/></div>
        <div className="form-group"><label className="form-label">Geschatte uren</label><input className="form-input" type="number" placeholder="0" value={form.estimated_hours} onChange={e=>setForm({...form,estimated_hours:e.target.value})}/></div>
      </div>
      <div className="form-row">
        <div className="form-group">
          <label className="form-label">Fase</label>
          <select className="form-select" value={form.phase} onChange={e=>setForm({...form,phase:e.target.value,is_parallel:e.target.value===''})}>
            <option value="">Parallel (geen fase)</option>
            {phases.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
          </select>
        </div>
        <div className="form-group"><label className="form-label">Beschrijving</label><input className="form-input" placeholder="Optioneel…" value={form.description} onChange={e=>setForm({...form,description:e.target.value})}/></div>
      </div>
      <div style={{display:'flex',gap:8}}>
        <button className="add-btn" style={{padding:'8px 20px',fontSize:13}} onClick={()=>{if(form.task_name.trim())onSave({task_name:form.task_name,estimated_hours:parseFloat(form.estimated_hours)||0,description:form.description,phase:form.phase,is_parallel:!form.phase});}}>Toevoegen</button>
        <button className="add-btn secondary" style={{padding:'8px 20px',fontSize:13}} onClick={onCancel}>Annuleren</button>
      </div>
    </div>
  );
}

// ── ACCOUNTS TAB ──────────────────────────────────────────────────────────────
function AccountsTab({accounts,settings,onRefresh}){
  const[showForm,setShowForm]=useState(false);
  const[form,setForm]=useState({name:'',balance:'',owner:'laslo'});
  const lasloTotal=accounts.filter(a=>a.owner==='laslo').reduce((s,a)=>s+Number(a.balance),0);
  const herTotal=accounts.filter(a=>a.owner==='her').reduce((s,a)=>s+Number(a.balance),0);
  const sharedTotal=accounts.filter(a=>a.owner==='shared').reduce((s,a)=>s+Number(a.balance),0);
  const netWorth=lasloTotal+herTotal+sharedTotal;
  const ownerLabel=o=>o==='laslo'?settings.laslo_name:o==='her'?settings.her_name:'Gedeeld';
  const ownerIcon=o=>o==='laslo'?'💙':o==='her'?'💗':'🤝';
  return(
    <div>
      <div className="networth-total mb-24"><div className="networth-label">Totaal vermogen</div><div className="networth-value">{fmtEur(netWorth)}</div></div>
      <div className="grid-3 mb-24">
        <div className="stat-card"><div className="stat-label"><span className="dot laslo"></span>{settings.laslo_name}</div><div className="stat-value green">{fmtEur(lasloTotal)}</div></div>
        <div className="stat-card"><div className="stat-label"><span className="dot her"></span>{settings.her_name}</div><div className="stat-value green">{fmtEur(herTotal)}</div></div>
        <div className="stat-card"><div className="stat-label"><span className="dot shared"></span>Gedeeld</div><div className="stat-value green">{fmtEur(sharedTotal)}</div></div>
      </div>
      <div className="card">
        <div className="section-header"><div className="section-title">🏦 Bankrekeningen</div><button className="add-btn secondary" onClick={()=>setShowForm(!showForm)}>{showForm?'Annuleren':'+ Rekening toevoegen'}</button></div>
        {showForm&&(<form onSubmit={async e=>{e.preventDefault();await supabase.from('accounts').insert({name:form.name,balance:parseFloat(form.balance),owner:form.owner});setForm({name:'',balance:'',owner:'laslo'});setShowForm(false);onRefresh();}} style={{marginBottom:20}}><div className="form-row"><div className="form-group"><label className="form-label">Naam</label><input className="form-input" placeholder="ING Spaarrekening" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} required/></div><div className="form-group"><label className="form-label">Saldo (€)</label><input className="form-input" type="number" step="0.01" value={form.balance} onChange={e=>setForm({...form,balance:e.target.value})} required/></div><div className="form-group"><label className="form-label">Van wie</label><select className="form-select" value={form.owner} onChange={e=>setForm({...form,owner:e.target.value})}><option value="laslo">{settings.laslo_name}</option><option value="her">{settings.her_name}</option><option value="shared">Gedeeld</option></select></div></div><button className="add-btn" type="submit">Opslaan</button></form>)}
        {accounts.length===0?<div className="empty"><div className="empty-icon">🏦</div>Nog geen rekeningen</div>:accounts.map(a=><AccountItem key={a.id} account={a} ownerLabel={ownerLabel} ownerIcon={ownerIcon} onDelete={async()=>{await supabase.from('accounts').delete().eq('id',a.id);onRefresh();}} onRefresh={onRefresh}/>)}
      </div>
    </div>
  );
}

function AccountItem({account,ownerLabel,ownerIcon,onDelete,onRefresh}){
  const[editing,setEditing]=useState(false);
  const[val,setVal]=useState(account.balance);
  return(<div className="account-item"><div style={{display:'flex',alignItems:'center',gap:12}}><div style={{fontSize:20}}>{ownerIcon(account.owner)}</div><div><div className="account-name">{account.name}</div><div className="account-owner">{ownerLabel(account.owner)}</div></div></div><div style={{display:'flex',alignItems:'center',gap:10}}>{editing?<><input type="number" step="0.01" value={val} onChange={e=>setVal(e.target.value)} style={{width:120,padding:'6px 10px',border:'2px solid #667eea',borderRadius:8,fontSize:14}}/><button className="add-btn" style={{padding:'6px 14px',fontSize:13}} onClick={async()=>{await supabase.from('accounts').update({balance:parseFloat(val)}).eq('id',account.id);setEditing(false);onRefresh();}}>Opslaan</button><button className="add-btn secondary" style={{padding:'6px 14px',fontSize:13}} onClick={()=>setEditing(false)}>Annuleren</button></>:<><div className="account-balance">{fmtEur(account.balance)}</div><button className="delete-btn" onClick={()=>setEditing(true)}>✏️</button><button className="delete-btn" onClick={onDelete}>🗑</button></>}</div></div>);
}

// ── SETTINGS TAB ──────────────────────────────────────────────────────────────
function SettingsTab({settings,onRefresh}){
  const[form,setForm]=useState({...settings,laslo_income:'',her_income:''});
  const[saved,setSaved]=useState(false);
  const[pwForm,setPwForm]=useState({newPw:'',confirmPw:''});
  const[pwMsg,setPwMsg]=useState(null);
  const[pwLoading,setPwLoading]=useState(false);
  const save=async e=>{e.preventDefault();await supabase.from('settings').update({laslo_name:form.laslo_name,her_name:form.her_name,shared_pct:parseFloat(form.shared_pct),openai_key:form.openai_key}).eq('id',1);setSaved(true);setTimeout(()=>setSaved(false),2000);onRefresh();};
  const changePw=async e=>{e.preventDefault();if(pwForm.newPw!==pwForm.confirmPw){setPwMsg({type:'error',text:'Wachtwoorden komen niet overeen.'});return;}if(pwForm.newPw.length<6){setPwMsg({type:'error',text:'Minimaal 6 tekens.'});return;}setPwLoading(true);const{error}=await supabase.auth.updateUser({password:pwForm.newPw});if(error)setPwMsg({type:'error',text:error.message});else{setPwMsg({type:'success',text:'✅ Wachtwoord gewijzigd!'});setPwForm({newPw:'',confirmPw:''});}setPwLoading(false);setTimeout(()=>setPwMsg(null),4000);};
  const lasloInc=parseFloat(form.laslo_income)||0;
  const herInc=parseFloat(form.her_income)||0;
  const autoCalc=lasloInc>0&&herInc>0?Math.round((lasloInc/(lasloInc+herInc))*100):null;
  return(
    <div>
      <div className="card mb-24">
        <div className="section-title" style={{marginBottom:24}}>⚙️ Instellingen</div>
        <form onSubmit={save}>
          <div className="form-row mb-16"><div className="form-group"><label className="form-label">Jouw naam</label><input className="form-input" value={form.laslo_name} onChange={e=>setForm({...form,laslo_name:e.target.value})} required/></div><div className="form-group"><label className="form-label">Naam partner</label><input className="form-input" value={form.her_name} onChange={e=>setForm({...form,her_name:e.target.value})} required/></div></div>
          <div style={{marginBottom:24}}><div className="form-label" style={{marginBottom:8}}>🤖 OpenAI API Key</div><input className="form-input" type="password" placeholder="sk-..." value={form.openai_key} onChange={e=>setForm({...form,openai_key:e.target.value})} style={{width:'100%',marginBottom:4}}/><div style={{fontSize:12,color:'#94a3b8'}}>Veilig opgeslagen in je database.</div></div>
          <div style={{marginBottom:24}}><div className="form-label" style={{marginBottom:12}}>Inkomen-gebaseerde verdeling</div><div className="form-row"><div className="form-group"><label className="form-label">{form.laslo_name} inkomen (€)</label><input className="form-input" type="number" placeholder="0" value={form.laslo_income} onChange={e=>setForm({...form,laslo_income:e.target.value})}/></div><div className="form-group"><label className="form-label">{form.her_name} inkomen (€)</label><input className="form-input" type="number" placeholder="0" value={form.her_income} onChange={e=>setForm({...form,her_income:e.target.value})}/></div></div>{autoCalc&&<div style={{marginBottom:12,padding:'10px 14px',background:'#f0f4ff',borderRadius:10,fontSize:13,color:'#667eea',fontWeight:500}}>💡 {form.laslo_name} {autoCalc}% / {form.her_name} {100-autoCalc}%<button type="button" className="add-btn" style={{marginLeft:12,padding:'4px 12px',fontSize:12}} onClick={()=>setForm({...form,shared_pct:autoCalc})}>Toepassen</button></div>}</div>
          <div style={{marginBottom:24}}><div className="form-label" style={{marginBottom:12}}>Verdeling gedeelde uitgaven</div><div className="slider-wrap"><div className="slider-label"><span>{form.laslo_name}: {form.shared_pct}%</span><span>{form.her_name}: {100-form.shared_pct}%</span></div><input type="range" min="0" max="100" value={form.shared_pct} onChange={e=>setForm({...form,shared_pct:parseInt(e.target.value)})}/><div className="slider-names"><span>0%</span><span>50/50</span><span>100%</span></div></div></div>
          <button className="add-btn" type="submit">{saved?'✅ Opgeslagen!':'Instellingen opslaan'}</button>
        </form>
      </div>
      <div className="pw-section">
        <div className="pw-section-title">🔒 Wachtwoord wijzigen</div>
        <form onSubmit={changePw}>
          <div className="form-row"><div className="form-group"><label className="form-label">Nieuw wachtwoord</label><input className="form-input" type="password" placeholder="Minimaal 6 tekens" value={pwForm.newPw} onChange={e=>setPwForm({...pwForm,newPw:e.target.value})} required/></div><div className="form-group"><label className="form-label">Bevestig</label><input className="form-input" type="password" placeholder="Herhaal wachtwoord" value={pwForm.confirmPw} onChange={e=>setPwForm({...pwForm,confirmPw:e.target.value})} required/></div></div>
          <button className="add-btn danger" type="submit" disabled={pwLoading}>{pwLoading?'Bezig…':'Wachtwoord wijzigen'}</button>
          {pwMsg&&<div className={pwMsg.type==='success'?'success-msg':'error-msg'}>{pwMsg.text}</div>}
        </form>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
