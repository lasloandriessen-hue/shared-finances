function getCategoryInfo(id) {
  return CATEGORIES.find(c => c.id === id) || CATEGORIES[CATEGORIES.length - 1];
}

function LogoOrIcon({ name, category }) {
  const [logoUrl, setLogoUrl] = useState(null);
  const [failed, setFailed] = useState(false);
  useEffect(() => {
    if (!name) return;
    const domain = guessDomain(name);
    if (domain) setLogoUrl(`https://logo.clearbit.com/${domain}`);
  }, [name]);
  function guessDomain(n) {
    const map = {
      spotify:'spotify.com', netflix:'netflix.com', amazon:'amazon.com',
      google:'google.com', apple:'apple.com', microsoft:'microsoft.com',
      youtube:'youtube.com', disney:'disneyplus.com', linkedin:'linkedin.com',
      dropbox:'dropbox.com', slack:'slack.com', github:'github.com',
      adobe:'adobe.com', zoom:'zoom.us', paypal:'paypal.com',
      uber:'uber.com', airbnb:'airbnb.com', twitter:'twitter.com',
      instagram:'instagram.com', facebook:'facebook.com', tiktok:'tiktok.com',
      twitch:'twitch.tv', steam:'steampowered.com', ikea:'ikea.com',
      abn:'abnamro.nl', ing:'ing.nl', rabobank:'rabobank.nl',
      ns:'ns.nl', 'albert heijn':'ah.nl', vodafone:'vodafone.com',
      kpn:'kpn.com', ziggo:'ziggo.nl', odido:'odido.nl',
    };
    const lower = n.toLowerCase();
    for (const [k, v] of Object.entries(map)) {
      if (lower.includes(k)) return v;
    }
    return null;
  }
  const cat = getCategoryInfo(category);
  if (logoUrl && !failed) {
    return <img src={logoUrl} alt={name} onError={() => setFailed(true)} style={{width:28,height:28,objectFit:'contain'}} />;
  }
  return <span style={{fontSize:22}}>{cat.icon}</span>;
}

function daysUntil(dateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}

function fmtDate(dateStr) {
  if (!dateStr) return '';
  return new Date(dateStr).toLocaleDateString('nl-NL', { day:'numeric', month:'short' });
}

function fmtEur(n) {
  return '€' + Number(n).toLocaleString('nl-NL', { minimumFractionDigits:2, maximumFractionDigits:2 });
}

function currentMonthRange() {
  const now = new Date();
  const start = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
  const end = new Date(now.getFullYear(), now.getMonth()+1, 0).toISOString().split('T')[0];
  return { start, end };
}

function App() {
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    supabase.auth.getSession().then(({ data }) => { setSession(data.session); setLoading(false); });
    const { data: listener } = supabase.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => listener.subscription.unsubscribe();
  }, []);
  if (loading) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',fontSize:24}}>⏳</div>;
  if (!session) return <Login />;
  return <Main session={session} />;
}

function Login() {
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [err, setErr] = useState('');
  const [loading, setLoading] = useState(false);
  const handleLogin = async (e) => {
    e.preventDefault(); setErr(''); setLoading(true);
    const { error } = await supabase.auth.signInWithPassword({ email, password: pw });
    if (error) setErr(error.message);
    setLoading(false);
  };
  return (
    <div className="login-bg">
      <div className="login-card">
        <div className="login-logo">💰</div>
        <div className="login-title">Shared Finances</div>
        <div className="login-sub">Jouw persoonlijke finance dashboard</div>
        <form onSubmit={handleLogin}>
          <input type="email" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} required />
          <input type="password" placeholder="Wachtwoord" value={pw} onChange={e=>setPw(e.target.value)} required />
          <button className="login-btn" type="submit" disabled={loading}>{loading?'Inloggen…':'Log in'}</button>
          {err && <div className="login-error">{err}</div>}
        </form>
      </div>
    </div>
  );
}

function Main({ session }) {
  const [tab, setTab] = useState('overview');
  const [expenses, setExpenses] = useState([]);
  const [incomes, setIncomes] = useState([]);
  const [accounts, setAccounts] = useState([]);
  const [settings, setSettings] = useState({ laslo_name:'Laslo', her_name:'Partner', shared_pct:60 });

  const fetchAll = useCallback(async () => {
    const { start, end } = currentMonthRange();
    const [eRes, iRes, aRes, sRes] = await Promise.all([
      supabase.from('expenses').select('*').gte('date',start).lte('date',end).order('date'),
      supabase.from('incomes').select('*').gte('date',start).lte('date',end).order('date'),
      supabase.from('accounts').select('*').order('owner'),
      supabase.from('settings').select('*').eq('id',1).single(),
    ]);
    setExpenses(eRes.data||[]);
    setIncomes(iRes.data||[]);
    setAccounts(aRes.data||[]);
    if (sRes.data) setSettings(sRes.data);
  }, []);

  useEffect(() => { fetchAll(); }, [fetchAll]);

  const tabs = [
    { id:'overview', label:'📊 Overview' },
    { id:'laslo', label:`💙 ${settings.laslo_name}` },

    { id:'shared', label:'🤝 Shared' },
    { id:'accounts', label:'🏦 Accounts' },
    { id:'settings', label:'⚙️ Settings' },

        {tab==='her' && <PersonTab person="her" label={settings.her_name} expenses={expenses} incomes={incomes} settings={settings} onRefresh={fetchAll} />}

function Overview({ expenses, incomes, accounts, settings, onRefresh }) {
  const now = new Date();
  const monthName = now.toLocaleString('nl-NL',{month:'long',year:'numeric'});
  const lasloIncome = incomes.filter(i=>i.person==='laslo').reduce((s,i)=>s+Number(i.amount),0);
  const herIncome = incomes.filter(i=>i.person==='her').reduce((s,i)=>s+Number(i.amount),0);
  const lasloPersonal = expenses.filter(e=>e.person==='laslo'&&!e.is_shared).reduce((s,e)=>s+Number(e.amount),0);
  const herPersonal = expenses.filter(e=>e.person==='her'&&!e.is_shared).reduce((s,e)=>s+Number(e.amount),0);
  const sharedTotal = expenses.filter(e=>e.is_shared).reduce((s,e)=>s+Number(e.amount),0);
  const pct = settings.shared_pct;
  const lasloShared = sharedTotal*(pct/100);
  const herShared = sharedTotal*((100-pct)/100);
  const lasloNet = lasloIncome - lasloPersonal - lasloShared;
  const herNet = herIncome - herPersonal - herShared;
  const totalNetWorth = accounts.reduce((s,a)=>s+Number(a.balance),0);

  const today = new Date(); today.setHours(0,0,0,0);
  const in7 = new Date(today); in7.setDate(in7.getDate()+7);
  const upcoming = [
    ...expenses.map(e=>({...e,type:'expense'})),
    ...incomes.map(i=>({...i,type:'income'})),
  ].filter(x => {
    if (!x.date) return false;
    const d = new Date(x.date); d.setHours(0,0,0,0);
    return d >= today && d <= in7;
  }).sort((a,b)=>new Date(a.date)-new Date(b.date));

  return (
    <div>
      <div style={{marginBottom:24}}>
        <div style={{fontSize:22,fontWeight:700,color:'#1e293b',marginBottom:4}}>Goeiedag! 👋</div>
        <div style={{color:'#64748b',fontSize:14,textTransform:'capitalize'}}>{monthName}</div>
      </div>
      <div className="networth-total mb-16">
        <div className="networth-label">Totaal vermogen</div>
        <div className="networth-value">{fmtEur(totalNetWorth)}</div>
      </div>
      <div className="grid-4 mb-24">
        <div className="stat-card">
          <div className="stat-label"><span className="dot laslo"></span>{settings.laslo_name} inkomen</div>
          <div className="stat-value green">{fmtEur(lasloIncome)}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label"><span className="dot her"></span>{settings.her_name} inkomen</div>
          <div className="stat-value green">{fmtEur(herIncome)}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Gedeelde uitgaven</div>
          <div className="stat-value red">{fmtEur(sharedTotal)}</div>
          <div className="stat-sub">{settings.laslo_name} {pct}% · {settings.her_name} {100-pct}%</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Gecombineerde cashflow</div>
          <div className={`stat-value ${lasloNet+herNet>=0?'green':'red'}`}>{fmtEur(lasloNet+herNet)}</div>
        </div>
      </div>
      <div className="grid-2 mb-24">
        <div className="stat-card">
          <div className="stat-label"><span className="dot laslo"></span>{settings.laslo_name} cashflow</div>
          <div className={`stat-value ${lasloNet>=0?'green':'red'}`}>{fmtEur(lasloNet)}</div>
          <div className="stat-sub">Inkomen {fmtEur(lasloIncome)} · Uitgaven {fmtEur(lasloPersonal+lasloShared)}</div>
        </div>

function PersonTab({ person, label, expenses, incomes, settings, onRefresh }) {
  const [view, setView] = useState('list');
  const [showExpForm, setShowExpForm] = useState(false);
  const [showIncForm, setShowIncForm] = useState(false);

  const myExpenses = expenses.filter(e=>e.person===person&&!e.is_shared);
  const mySharedExpenses = expenses.filter(e=>e.is_shared);
  const myIncomes = incomes.filter(i=>i.person===person);
  const totalInc = myIncomes.reduce((s,i)=>s+Number(i.amount),0);
  const totalExp = myExpenses.reduce((s,e)=>s+Number(e.amount),0);
  const pct = person==='laslo'?settings.shared_pct:100-settings.shared_pct;
  const sharedTotal = mySharedExpenses.reduce((s,e)=>s+Number(e.amount),0);
  const myShared = sharedTotal*(pct/100);
  const net = totalInc - totalExp - myShared;

  const deleteExpense = async (id) => { await supabase.from('expenses').delete().eq('id',id); onRefresh(); };
  const deleteIncome = async (id) => { await supabase.from('incomes').delete().eq('id',id); onRefresh(); };

  const allExpenses = [...myExpenses, ...mySharedExpenses];
  const catMap = {};
  allExpenses.forEach(e=>{
    const amt = e.is_shared ? Number(e.amount)*(pct/100) : Number(e.amount);
    catMap[e.category]=(catMap[e.category]||0)+amt;
  });
  const chartData = Object.entries(catMap).sort((a,b)=>b[1]-a[1]);
  const maxVal = chartData[0]?.[1]||1;

  return (
    <div>
      <div className="grid-3 mb-24">
        <div className="stat-card">
          <div className="stat-label">Inkomen</div>
          <div className="stat-value green">{fmtEur(totalInc)}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Totale uitgaven</div>
          <div className="stat-value red">{fmtEur(totalExp+myShared)}</div>
          <div className="stat-sub">Persoonlijk {fmtEur(totalExp)} · Gedeeld {fmtEur(myShared)}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Cashflow</div>
          <div className={`stat-value ${net>=0?'green':'red'}`}>{fmtEur(net)}</div>
          <div className="stat-sub">Na {pct}% van gedeelde kosten</div>
        </div>
      </div>

      <div className="card mb-16">
        <div className="section-header">
          <div className="section-title">💚 Inkomen</div>
          <button className="add-btn secondary" onClick={()=>setShowIncForm(!showIncForm)}>{showIncForm?'Annuleren':'+ Inkomen toevoegen'}</button>
        </div>
        {showIncForm && <IncomeForm person={person} onSave={()=>{onRefresh();setShowIncForm(false);}} />}
        {myIncomes.length===0
          ? <div className="empty"><div className="empty-icon">💸</div>Nog geen inkomen toegevoegd</div>
          : myIncomes.map(i=>(
            <div key={i.id} className="expense-item">
              <div className="expense-left">
                <div className="expense-icon">💰</div>
                <div>
                  <div className="expense-name">{i.label}</div>
                  <div className="expense-meta">{fmtDate(i.date)}</div>
                </div>
              </div>
              <div className="expense-right">
                <span className="expense-amount income">{fmtEur(i.amount)}</span>
                <button className="delete-btn" onClick={()=>deleteIncome(i.id)}>🗑</button>
              </div>
            </div>
          ))
        }
      </div>

      <div className="card">
        <div className="section-header">
          <div className="section-title">💸 Uitgaven</div>
          <div style={{display:'flex',gap:8,alignItems:'center'}}>
            <div className="view-toggle">
              <button className={`toggle-btn ${view==='list'?'active':''}`} onClick={()=>setView('list')}>Lijst</button>
              <button className={`toggle-btn ${view==='chart'?'active':''}`} onClick={()=>setView('chart')}>Grafiek</button>
            </div>
            <button className="add-btn secondary" onClick={()=>setShowExpForm(!showExpForm)}>{showExpForm?'Annuleren':'+ Uitgave toevoegen'}</button>
          </div>
        </div>
        {showExpForm && <ExpenseForm person={person} settings={settings} onSave={()=>{onRefresh();setShowExpForm(false);}} />}
        {view==='list'
          ? allExpenses.length===0
            ? <div className="empty"><div className="empty-icon">✅</div>Geen uitgaven deze maand</div>
            : allExpenses.map(e=>{
                const isShared = e.is_shared;
                const displayAmount = isShared ? Number(e.amount)*(pct/100) : Number(e.amount);
                return (
                  <div key={e.id} className="expense-item">
                    <div className="expense-left">
                      <div className="expense-icon"><LogoOrIcon name={e.name} category={e.category} /></div>
                      <div>
                        <div className="expense-name">{e.name}{isShared?' 🤝':''}</div>
                        <div className="expense-meta">{getCategoryInfo(e.category).label} · {fmtDate(e.date)}{e.description?' · '+e.description:''}</div>
                      </div>
                    </div>
                    <div className="expense-right">
                      <div style={{textAlign:'right'}}>
                        <div className="expense-amount">{fmtEur(displayAmount)}</div>
                        {isShared && <div style={{fontSize:11,color:'#94a3b8'}}>van {fmtEur(e.amount)} totaal</div>}
                      </div>
                      <button className="delete-btn" onClick={()=>deleteExpense(e.id)}>🗑</button>
                    </div>
                  </div>
                );
              })
          : <div className="chart-wrap">
              {chartData.length===0
                ? <div className="empty"><div className="empty-icon">📊</div>Nog geen data</div>
                : chartData.map(([cat,val])=>{
                  const info=getCategoryInfo(cat);
                  return (
                    <div key={cat} className="chart-bar-row">
                      <div className="chart-bar-label">{info.icon} {info.label}</div>
                      <div className="chart-bar-outer">
                        <div className="chart-bar-inner" style={{width:`${(val/maxVal)*100}%`,background:CAT_COLORS[cat]||'#94a3b8'}}>
                          <span className="chart-bar-val">{fmtEur(val)}</span>
                        </div>
                      </div>
                    </div>
                  );
                })
              }
            </div>
        }
      </div>
    </div>
  );
}

function AccountsTab({ accounts, settings, onRefresh }) {

  const sharedTotal = accounts.filter(a=>a.owner==='shared').reduce((s,a)=>s+Number(a.balance),0);
  const netWorth = lasloTotal + herTotal + sharedTotal;

    e.preventDefault();
    await supabase.from('accounts').insert({ name:form.name, balance:parseFloat(form.balance), owner:form.owner });

    setShowForm(false);
    onRefresh();

  const updateBalance = async (id, val) => { await supabase.from('accounts').update({ balance:parseFloat(val) }).eq('id',id); onRefresh(); };
  const ownerLabel = o => o==='laslo'?settings.laslo_name:o==='her'?settings.her_name:'Gedeeld';
  const ownerIcon = o => o==='laslo'?'💙':o==='her'?'💗':'🤝';

  return (
    <div>

          <div className="stat-value green">{fmtEur(lasloTotal)}</div>
        </div>
        <div className="stat-card">
          <div className="stat-label"><span className="dot her"></span>{settings.her_name}</div>
          <div className="stat-value green">{fmtEur(herTotal)}</div>

        <div className="stat-card">
          <div className="stat-label"><span className="dot shared"></span>Gedeeld</div>

        </div>
        {showForm && (
          <form onSubmit={saveAccount} style={{marginBottom:20}}>
            <div className="form-row">
              <div className="form-group">
                <label className="form-label">Naam rekening</label>
                <input className="form-input" placeholder="bijv. ING Spaarrekening" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} required />
              </div>
              <div className="form-group">
                <label className="form-label">Saldo (€)</label>
                <input className="form-input" type="number" step="0.01" placeholder="0.00" value={form.balance} onChange={e=>setForm({...form,balance:e.target.value})} required />
              </div>
              <div className="form-group">
                <label className="form-label">Van wie</label>
                <select className="form-select" value={form.owner} onChange={e=>setForm({...form,owner:e.target.value})}>

                </select>
              </div>
            </div>
            <button className="add-btn" type="submit">Opslaan</button>

        )}
        {accounts.length===0

function AccountItem({ account, ownerLabel, ownerIcon, onDelete, onUpdateBalance }) {
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(account.balance);
  const save = () => { onUpdateBalance(account.id, val); setEditing(false); };
  return (
    <div className="account-item">
      <div className="account-left">
        <div style={{fontSize:20}}>{ownerIcon(account.owner)}</div>
        <div>
          <div className="account-name">{account.name}</div>
          <div className="account-owner">{ownerLabel(account.owner)}</div>
        </div>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        {editing
          ? <>
              <input type="number" step="0.01" value={val} onChange={e=>setVal(e.target.value)} style={{width:120,padding:'6px 10px',border:'2px solid #667eea',borderRadius:8,fontSize:14}} />
              <button className="add-btn" style={{padding:'6px 14px',fontSize:13}} onClick={save}>Opslaan</button>
              <button className="add-btn secondary" style={{padding:'6px 14px',fontSize:13}} onClick={()=>setEditing(false)}>Annuleren</button>
            </>
          : <>
              <div className="account-balance">{fmtEur(account.balance)}</div>
              <button className="delete-btn" onClick={()=>setEditing(true)}>✏️</button>
              <button className="delete-btn" onClick={()=>onDelete(account.id)}>🗑</button>
            </>
        }
      </div>
    </div>
  );
}

function IncomeForm({ person, onSave }) {
  const today = new Date().toISOString().split('T')[0];
  const [form, setForm] = useState({ label:'', amount:'', date:today });
  const handleSubmit = async (e) => {
    e.preventDefault();
    await supabase.from('incomes').insert({ person, label:form.label, amount:parseFloat(form.amount), date:form.date });
    onSave();
  };
  return (
    <form onSubmit={handleSubmit} style={{background:'#f0fdf4',borderRadius:12,padding:16,marginBottom:16}}>
      <div className="form-row">
        <div className="form-group">
          <label className="form-label">Label</label>
          <input className="form-input" placeholder="bijv. Salaris" value={form.label} onChange={e=>setForm({...form,label:e.target.value})} required />
        </div>
        <div className="form-group">
          <label className="form-label">Bedrag (€)</label>
          <input className="form-input" type="number" step="0.01" placeholder="0.00" value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} required />
        </div>
        <div className="form-group">
          <label className="form-label">Datum</label>
          <input className="form-input" type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} required />
        </div>
      </div>
      <button className="add-btn" type="submit">Opslaan</button>
    </form>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
